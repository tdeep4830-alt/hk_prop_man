services:
  db:
    image: pgvector/pgvector:pg16
    container_name: propman-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-propman}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-propman_secret}
      POSTGRES_DB: ${POSTGRES_DB:-propman_ai}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-propman} -d ${POSTGRES_DB:-propman_ai}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: propman-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: propman-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./app:/code/app
      - ./migrations:/code/migrations
      - ./rag_data:/code/rag_data
      - ./scripts:/code/scripts
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      phoenix:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Observability stack (Phase 6)
  # ---------------------------------------------------------------------------
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: propman-phoenix
    restart: unless-stopped
    ports:
      - "6006:6006"   # Phoenix UI + OTLP HTTP receiver
    volumes:
      - phoenixdata:/root/.phoenix

  prometheus:
    image: prom/prometheus:latest
    container_name: propman-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    container_name: propman-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"   # mapped to 3001 to avoid conflict with frontend dev server
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus

volumes:
  pgdata:
  redisdata:
  phoenixdata:
  prometheusdata:
  grafanadata:
