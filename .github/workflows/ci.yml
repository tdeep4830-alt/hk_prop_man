name: CI/CD Pipeline

on:
  # Unit tests: every push and PR (fast feedback, no API cost)
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # RAGAS eval: nightly 02:00 UTC, or manual trigger (cost-controlled)
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Unit Tests — runs on every push / PR
  # Fast (<5s), no external dependencies, no API keys required.
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests (Fast)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/test_services/ -v \
            --timeout=30 \
            -m "not integration and not eval"
        # No LLM API keys needed — LLM calls are mocked via pytest-mock.

  # ---------------------------------------------------------------------------
  # Job 2: RAG Quality Gate — only Nightly or manual trigger
  # Requires PostgreSQL + pgvector service and OpenAI API key for RAGAS judge.
  # Failure blocks deployment by reporting a failed check.
  # ---------------------------------------------------------------------------
  rag-eval:
    name: RAG Quality Gate (Nightly / Manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: propman
          POSTGRES_PASSWORD: propman_secret
          POSTGRES_DB: propman_ai
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U propman -d propman_ai"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply database migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://propman:propman_secret@localhost:5432/propman_ai

      - name: Run RAGAS Evaluation (Medium + Hard)
        run: |
          pytest tests/test_rag/test_ragas_eval.py::test_rag_quality_medium_hard \
            -m eval \
            -v \
            --timeout=600
        env:
          DATABASE_URL: postgresql+asyncpg://propman:propman_secret@localhost:5432/propman_ai
          REDIS_URL: redis://localhost:6379/0
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Evaluates real LLM answers vs retrieved context; score < 0.75 blocks deploy

      - name: Run RAGAS Evaluation (Simple / No-Retrieval)
        run: |
          pytest tests/test_rag/test_ragas_eval.py::test_rag_quality_simple \
            -m eval \
            -v \
            --timeout=300
        env:
          DATABASE_URL: postgresql+asyncpg://propman:propman_secret@localhost:5432/propman_ai
          REDIS_URL: redis://localhost:6379/0
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Evaluates LLM parametric knowledge without retrieval; score < 0.75 blocks deploy

  # ---------------------------------------------------------------------------
  # Job 3: Retriever Integration Tests — runs alongside unit tests on push/PR
  # Requires PostgreSQL but no LLM API keys.
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Integration Tests (DB)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: propman
          POSTGRES_PASSWORD: propman_secret
          POSTGRES_DB: propman_ai
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U propman -d propman_ai"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply database migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://propman:propman_secret@localhost:5432/propman_ai

      - name: Run integration tests
        run: |
          pytest tests/test_integration/ \
            -m integration \
            -v \
            --timeout=60
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://propman:propman_secret@localhost:5432/propman_ai
          SILICONFLOW_API_KEY: dummy_key_not_needed   # embedding is mocked in integration tests
